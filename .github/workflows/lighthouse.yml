name: Lighthouse CI
on:
  push:
    branches-ignore:
      - 'main'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: install dependencies
        working-directory: ./chapter09
        run: npm ci
      - name: build
        working-directory: ./chapter09
        run: npm run build
      - name: run lighthouse ci
        working-directory: ./chapter09
        run: npx lhci autorun